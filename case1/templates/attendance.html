<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .camera-box { width: 100%; max-width: 640px; margin: 0 auto; background: #000; min-height: 480px; position: relative; overflow: hidden; border-radius: 8px;}
        video, img.video-stream { width: 100%; height: auto; display: block; }
        canvas { display: none; }
        .status-badge { position: absolute; top: 10px; right: 10px; }
        
        /* Success Animation Overlay */
        .checkin-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 167, 69, 0.3);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            z-index: 10;
        }
        
        .checkin-icon {
            font-size: 5rem;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .checkin-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translate3d(0, 20px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="d-flex justify-content-center py-3">
            <ul class="nav nav-pills">
                <li class="nav-item"><a href="/" class="nav-link">首页</a></li>
                <li class="nav-item"><a href="/users_page" class="nav-link">用户管理</a></li>
                <li class="nav-item"><a href="/attendance_page" class="nav-link active">考勤记录</a></li>
            </ul>
        </header>

        <div class="row">
            <div class="col-md-6">
                <!-- Local Camera (Backend) -->
                <div class="card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>设备摄像头（自动打卡）</span>
                        <span class="badge bg-danger">实时</span>
                    </div>
                    <div class="card-body p-0 text-center bg-black position-relative camera-box">
                        <img src="/video_feed" class="video-stream" alt="摄像头画面" onerror="this.style.display='none'; document.getElementById('cam-error').style.display='block'">
                        <div id="cam-error" class="text-white p-5" style="display:none;">
                            <p>摄像头画面不可用</p>
                            <small>请检查摄像头是否连接到服务器</small>
                        </div>

                        <!-- Overlay for Device Camera -->
                        <div id="device-overlay" class="checkin-overlay">
                            <div class="checkin-icon">✅</div>
                            <div class="checkin-text" id="device-checkin-name">用户名</div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="col-md-6">
                <h3>考勤记录</h3>
                <button class="btn btn-sm btn-outline-primary mb-2" onclick="loadAttendance()">刷新</button>
                <div style="height: 600px; overflow-y: auto;">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>用户</th>
                                <th>头像</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Upload Checkin
        function uploadCheckin() {
            const fileInput = document.getElementById('uploadImage');
            if(fileInput.files.length === 0) return;
            
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            
            fetch('/api/clockin', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success && data.match) {
                    alert(`打卡成功: ${data.user}`);
                    loadAttendance();
                } else {
                    alert('打卡失败或未匹配到用户');
                }
            });
        }

        // Load Attendance
        function loadAttendance() {
            fetch('/api/attendance')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('attendanceTableBody');
                    tbody.innerHTML = '';
                    data.forEach(row => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${row.timestamp}</td>
                            <td>${row.name || '未知'}</td>
                            <td>${row.type}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                });
        }
        
        // Auto refresh attendance log every 5 seconds (to show device camera check-ins)
        let lastAttendanceCount = 0;
        
        function loadAttendance() {
            fetch('/api/attendance')
                .then(response => response.json())
                .then(data => {
                    // Check for new records (auto-checkin detection)
                    if (data.length > lastAttendanceCount && lastAttendanceCount !== 0) {
                        const newRecord = data[0]; // Assuming sorted DESC
                        if (newRecord && newRecord.type === 'camera_auto') {
                             showAnimation('device-overlay', newRecord.name);
                        }
                    }
                    lastAttendanceCount = data.length;
                
                    const tbody = document.getElementById('attendanceTableBody');
                    tbody.innerHTML = '';
                    data.forEach(row => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${row.timestamp}</td>
                            <td>${row.name || '未知'}</td>
                            <td><img src="/uploads/${row.image_path}" style="width:60px;height:60px;object-fit:cover;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22%3E%3Crect fill=%22%23ddd%22 width=%2260%22 height=%2260%22/%3E%3C/svg%3E'"></td>
                        `;
                        tbody.appendChild(tr);
                    });
                });
        }
        
        function showAnimation(overlayId, name) {
            const overlay = document.getElementById(overlayId);
            const text = overlay.querySelector('.checkin-text');
            text.innerText = "Welcome, " + name + "!";
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 2000);
        }
        
        setInterval(loadAttendance, 2000); // Faster refresh for animation

        loadAttendance();
    </script>

<!-- attendance delete manager injected by patch -->
<style>
#attendanceDeleteManager {
    max-width: 960px;
    margin: 24px auto;
    padding: 16px;
    border: 1px solid #dee2e6;
    border-radius: 8px;
    background: #ffffff;
}
#attendanceDeleteManager h5 {
    margin: 0 0 12px 0;
    font-weight: 600;
}
#attendanceDeleteManager table {
    width: 100%;
    border-collapse: collapse;
}
#attendanceDeleteManager th,
#attendanceDeleteManager td {
    border-bottom: 1px solid #e9ecef;
    padding: 8px;
    text-align: left;
    font-size: 14px;
}
#attendanceDeleteManager button {
    border: 0;
    border-radius: 4px;
    padding: 5px 10px;
    background: #dc3545;
    color: white;
    cursor: pointer;
}
#attendanceDeleteManager button:hover {
    background: #bb2d3b;
}
#attendanceDeleteManager .muted {
    color: #6c757d;
    font-size: 13px;
}
</style>

<script>
(function () {
    if (window.__attendanceDeleteManagerInstalled) {
        return;
    }
    window.__attendanceDeleteManagerInstalled = true;

    function getUserName(record) {
        return record.name || record.user_name || record.username || record.real_name || ("用户ID " + (record.user_id || ""));
    }

    function getTime(record) {
        return record.timestamp || record.time || record.created_at || record.checkin_time || "";
    }

    function getTemperature(record) {
        if (record.temperature === undefined || record.temperature === null || record.temperature === "") {
            return "-";
        }
        var n = Number(record.temperature);
        if (Number.isNaN(n)) {
            return record.temperature;
        }
        return n.toFixed(2) + "℃";
    }

    async function loadAttendanceDeleteManager() {
        var box = document.getElementById("attendanceDeleteManager");
        if (!box) {
            box = document.createElement("div");
            box.id = "attendanceDeleteManager";
            document.body.appendChild(box);
        }

        box.innerHTML = "<h5>考勤记录管理</h5><div class='muted'>正在加载考勤记录...</div>";

        try {
            var resp = await fetch("/api/attendance?t=" + Date.now());
            var records = await resp.json();

            if (!Array.isArray(records) || records.length === 0) {
                box.innerHTML = "<h5>考勤记录管理</h5><div class='muted'>暂无考勤记录</div>";
                return;
            }

            var rows = records.map(function (r) {
                var id = r.id;
                var disabled = id === undefined || id === null ? "disabled" : "";
                return "<tr>" +
                    "<td>" + (id === undefined || id === null ? "-" : id) + "</td>" +
                    "<td>" + getUserName(r) + "</td>" +
                    "<td>" + (r.type || "-") + "</td>" +
                    "<td>" + getTemperature(r) + "</td>" +
                    "<td>" + getTime(r) + "</td>" +
                    "<td><button " + disabled + " onclick='deleteAttendanceRecord(" + id + ")'>取消考勤</button></td>" +
                    "</tr>";
            }).join("");

            box.innerHTML =
                "<h5>考勤记录管理</h5>" +
                "<div class='muted'>删除某条记录后，该用户可以立即再次自动考勤，方便测试注册效果。</div>" +
                "<table>" +
                "<thead><tr><th>ID</th><th>用户</th><th>类型</th><th>温度</th><th>时间</th><th>操作</th></tr></thead>" +
                "<tbody>" + rows + "</tbody>" +
                "</table>";

        } catch (e) {
            box.innerHTML = "<h5>考勤记录管理</h5><div class='muted'>加载失败：" + e + "</div>";
        }
    }

    window.deleteAttendanceRecord = async function (id) {
        if (!id) {
            alert("该记录没有 ID，无法删除");
            return;
        }

        if (!confirm("确认取消这条考勤记录吗？删除后该用户可以重新考勤。")) {
            return;
        }

        try {
            var resp = await fetch("/api/attendance/" + id, {
                method: "DELETE"
            });

            var data = await resp.json();

            if (!resp.ok || !data.success) {
                alert("删除失败：" + (data.error || resp.status));
                return;
            }

            alert("已取消考勤，可以重新测试打卡");

            await loadAttendanceDeleteManager();

            if (typeof loadAttendance === "function") {
                try {
                    loadAttendance();
                } catch (e) {}
            }
        } catch (e) {
            alert("删除异常：" + e);
        }
    };

    document.addEventListener("DOMContentLoaded", loadAttendanceDeleteManager);

    // 如果页面是异步切换加载，也延迟再刷新一次
    setTimeout(loadAttendanceDeleteManager, 1000);
})();
</script>

</body>
</html>
